<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Jump Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0f1115;--card:#1a1e27;--card2:#232936;--txt:#e8ecf3;--mut:#8b93a5;--acc:#4ade80;--acc2:#60a5fa;--warn:#f87171;--bord:#2c3342}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,'Segoe UI',Roboto,sans-serif;font-size:15px;padding-bottom:calc(64px + env(safe-area-inset-bottom))}
header{position:sticky;top:0;z-index:20;background:rgba(15,17,21,.95);backdrop-filter:blur(8px);padding:calc(10px + env(safe-area-inset-top)) 16px 10px;border-bottom:1px solid var(--bord);display:flex;align-items:center;gap:10px}
header h1{font-size:17px;font-weight:700;flex:1}
main{padding:14px;max-width:640px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--bord);border-radius:14px;padding:14px;margin-bottom:10px}
.card h3{font-size:15px;margin-bottom:4px}
.mut{color:var(--mut);font-size:12.5px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{background:var(--acc);color:#08130b;border:none;border-radius:10px;padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer}
.btn.sec{background:var(--card2);color:var(--txt);border:1px solid var(--bord);font-weight:600}
.btn.danger{background:transparent;color:var(--warn);border:1px solid var(--warn)}
.btn.sm{padding:6px 10px;font-size:12.5px;border-radius:8px}
.btn.wide{width:100%;margin-top:8px}
.chip{background:var(--card2);border:1px solid var(--bord);color:var(--mut);border-radius:20px;padding:6px 12px;font-size:12.5px;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--acc);color:#08130b;border-color:var(--acc);font-weight:700}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:8px}
input,textarea,select{background:var(--card2);border:1px solid var(--bord);color:var(--txt);border-radius:9px;padding:9px 10px;font-size:14px;width:100%}
input:focus,textarea:focus{outline:1px solid var(--acc)}
label{font-size:12px;color:var(--mut);display:block;margin:8px 0 3px}
nav{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;background:#141822;border-top:1px solid var(--bord);padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;border:none;color:var(--mut);font-size:10.5px;padding:7px 0 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
nav button.on{color:var(--acc)}
nav button span{font-size:19px;line-height:1}
.setline{display:grid;grid-template-columns:26px 1fr 64px 58px 40px;gap:6px;align-items:center;margin-top:6px}
.setline .num{color:var(--mut);font-size:12px;text-align:center}
.setline .plan{font-size:12.5px;color:var(--mut)}
.setline input{padding:8px 6px;text-align:center;font-size:14px}
.done-btn{width:40px;height:38px;border-radius:9px;border:1px solid var(--bord);background:var(--card2);color:var(--mut);font-size:17px;cursor:pointer}
.done-btn.on{background:var(--acc);color:#08130b;border-color:var(--acc)}
.vbtn{color:var(--acc2);font-size:12.5px;text-decoration:none;border:1px solid var(--acc2);border-radius:8px;padding:5px 10px;display:inline-block}
#timerbar{position:fixed;bottom:calc(52px + env(safe-area-inset-bottom));left:0;right:0;z-index:25;background:#141822ee;border-top:1px solid var(--bord);padding:8px 12px;display:none;align-items:center;gap:8px;justify-content:center}
#timerbar.show{display:flex}
#tdisp{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;min-width:70px;text-align:center}
#tdisp.alert{color:var(--warn)}
#modal{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;display:none;align-items:flex-end;justify-content:center}
#modal.show{display:flex}
#modal .box{background:var(--card);border-radius:18px 18px 0 0;width:100%;max-width:640px;max-height:88vh;overflow-y:auto;padding:18px 16px calc(18px + env(safe-area-inset-bottom))}
.exname{font-weight:700;font-size:14.5px}
.variant-seg{display:flex;flex-wrap:wrap;gap:5px;margin:7px 0}
.variant-seg .chip{font-size:11.5px;padding:5px 9px}
canvas{background:var(--card);border-radius:14px;padding:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
td,th{padding:7px 6px;border-bottom:1px solid var(--bord);text-align:left}
th{color:var(--mut);font-weight:600;font-size:11.5px}
.big{font-size:22px;font-weight:800}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
h2.sect{font-size:13px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
.setsline{font-size:12.5px;color:var(--mut);margin-top:2px}
.setsline b{color:var(--txt);font-weight:600}
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#232936;border:1px solid var(--bord);color:var(--txt);padding:9px 16px;border-radius:10px;z-index:99;opacity:0;transition:opacity .3s;pointer-events:none;font-size:13px;white-space:nowrap}
#toast.show{opacity:1}
.viewbar{border-color:var(--acc2)!important;background:#17233a!important}
</style>
</head>
<body>
<header><h1 id="htitle">Jump Tracker</h1><span id="hsub" class="mut"></span></header>
<main id="view"></main>
<div id="timerbar">
  <button class="btn sm sec" onclick="startTimer(60)">1:00</button>
  <button class="btn sm sec" onclick="startTimer(90)">1:30</button>
  <button class="btn sm sec" onclick="startTimer(120)">2:00</button>
  <button class="btn sm sec" onclick="startTimer(180)">3:00</button>
  <div id="tdisp">–:––</div>
  <button class="btn sm danger" onclick="stopTimer()">✕</button>
</div>
<nav id="tabs"></nav>
<div id="modal" onclick="if(event.target===this)closeModal()"><div class="box" id="mbox"></div></div>
<div id="toast"></div>

const LS={
 get(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}},
 set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
};
let sb=null,session=null,me=null,viewing=null;
let prog=[],logs=[],metrics=[],settings={customMetrics:[],rm:{}};
let aw=null;

const myUid=()=>session?session.user.id:'anon';
const duid=()=>viewing?viewing.id:myUid();
const isStaff=()=>!!me&&(me.role==='admin'||me.role==='trainer');
const k=n=>'vjt_'+myUid()+'_'+n;
const roleName=r=>({admin:'админ',trainer:'тренер',paid:'подписка',free:'бесплатный'}[r]||r);

function seedProgram(){
 const free=me&&me.role==='free';
 return free?[{t:'Мой день 1',s:'моя программа',e:[]}]:JSON.parse(JSON.stringify(DEFAULT_PROGRAM));
}
function normSettings(s){s=s&&typeof s==='object'?s:{};s.customMetrics=Array.isArray(s.customMetrics)?s.customMetrics:[];s.rm=s.rm&&typeof s.rm==='object'?s.rm:{};return s}
function loadLocal(){
 prog=LS.get(k('program'),null)||(sb?[]:seedProgram());
 logs=LS.get(k('logs'),[]);
 metrics=LS.get(k('metrics'),[]);
 settings=normSettings(LS.get(k('settings'),null));
 aw=LS.get(k('active'),null);
}
function cacheAll(){LS.set(k('program'),prog);LS.set(k('logs'),logs);LS.set(k('metrics'),metrics);LS.set(k('settings'),settings)}

/* ---- запись ---- */
function chk(r){if(r&&r.error){console.error(r.error);toast('⚠ Ошибка синхронизации')}return r}
const chkP=p=>{if(p&&p.then)p.then(chk)};
function saveProg(){
 if(!viewing)LS.set(k('program'),prog);
 if(sb&&session)chkP(sb.from('programs').upsert({user_id:duid(),days:prog,updated_at:new Date().toISOString()}));
}
function saveLogs(){if(!viewing)LS.set(k('logs'),logs)}
function pushLog(l){if(sb&&session)chkP(sb.from('workouts').upsert({user_id:duid(),cid:l.id,date:l.date,day_title:l.dayTitle,dur:l.dur,data:l}))}
function removeLog(id){if(sb&&session)chkP(sb.from('workouts').delete().eq('user_id',duid()).eq('cid',id))}
function saveMetrics(){if(!viewing)LS.set(k('metrics'),metrics)}
function pushMeas(e){if(sb&&session)chkP(sb.from('metrics').upsert({user_id:duid(),cid:e.id,d:e.d,data:e}))}
function removeMeas(id){if(sb&&session)chkP(sb.from('metrics').delete().eq('user_id',duid()).eq('cid',id))}
function saveSettings(){
 if(!viewing)LS.set(k('settings'),settings);
 if(sb&&session&&!viewing)chkP(sb.from('profiles').update({prefs:settings}).eq('id',myUid()));
}
function saveAw(){LS.set(k('active'),aw)}

/* ---- загрузка из облака ---- */
async function loadCloudOwn(){
 viewing=null;
 const uid=myUid();
 const p=await sb.from('profiles').select('*').eq('id',uid).single();
 if(p.error){toast('⚠ Не удалось загрузить профиль');console.error(p.error);return}
 me=p.data;
 settings=normSettings(me.prefs);
 const pr=await sb.from('programs').select('days').eq('user_id',uid).maybeSingle();
 if(pr.data&&Array.isArray(pr.data.days)&&pr.data.days.length){prog=pr.data.days}
 else{prog=seedProgram();chkP(sb.from('programs').upsert({user_id:uid,days:prog}))}
 const wo=await sb.from('workouts').select('data').eq('user_id',uid);
 logs=(wo.data||[]).map(r=>r.data).sort((a,b)=>a.id-b.id);
 const mt=await sb.from('metrics').select('data').eq('user_id',uid);
 metrics=(mt.data||[]).map(r=>r.data).sort((a,b)=>a.id-b.id);
 migrateOld();
 cacheAll();
}
// разовый перенос данных из старой локальной версии приложения
function migrateOld(){
 if(LS.get('vjt_migrated_'+myUid(),false))return;
 const ol=LS.get('vjt_logs',[]),om=LS.get('vjt_metrics',[]);
 if(!logs.length&&ol.length){logs=ol.slice();logs.forEach(l=>pushLog(l))}
 if(!metrics.length&&om.length){metrics=om.slice();metrics.forEach(e=>pushMeas(e))}
 LS.set('vjt_migrated_'+myUid(),true);
}

const BASE_METR=[['weight','Вес тела, кг'],['jumpst','Прыжок с места, см'],['jumprun','Прыжок с разбега, см'],['reach','Высота касания, см']];

const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const today=()=>new Date().toISOString().slice(0,10);
const fmtD=d=>{const p=String(d).split('-');return p.length===3?p[2]+'.'+p[1]+'.'+p[0].slice(2):d};
function toast(m){const t=$('#toast');t.textContent=m;t.className='show';setTimeout(()=>t.className='',2500)}
function pctKg(int,rm){
 if(!rm)return '';
 const m=String(int).match(/^(\d+)(?:-(\d+))?%$/);if(!m)return '';
 const f=v=>Math.round(v*rm/100/2.5)*2.5;
 const lo=f(+m[1]),hi=m[2]?f(+m[2]):null;
 return ' <span style="color:var(--acc)">≈'+lo+(hi&&hi!==lo?'–'+hi:'')+' кг</span>';
}
function setsText(x){
 const rm=settings.rm[x.n];
 return x.s.map(g=>`<b>${g[0]}×${esc(g[1])}</b>${g[2]?' @ '+esc(g[2]):''}${g[2]?pctKg(g[2],rm):''}`).join(' &nbsp;·&nbsp; ');
}
function lastFor(name){
 const vars=name.split(' / ');
 for(let i=logs.length-1;i>=0;i--){
  const f=logs[i].ex.find(e=>e.n===name||vars.includes(e.n));
  if(f&&f.sets.length)return {date:logs[i].date,sets:f.sets};
 }
 return null;
}

let authMode='in';
function renderAuth(){
 $('#htitle').textContent='Jump Tracker';$('#hsub').textContent='';
 $('#tabs').innerHTML='';$('#timerbar').classList.remove('show');
 $('#view').innerHTML=`<div class="card" style="margin-top:24px">
  <div class="chips">
   <span class="chip ${authMode==='in'?'on':''}" onclick="authMode='in';renderAuth()">Вход</span>
   <span class="chip ${authMode==='up'?'on':''}" onclick="authMode='up';renderAuth()">Регистрация</span>
  </div>
  ${authMode==='up'?'<label>Имя</label><input id="a_n" autocomplete="name">':''}
  <label>Email</label><input id="a_e" type="email" inputmode="email" autocomplete="email">
  <label>Пароль (минимум 6 символов)</label><input id="a_p" type="password" autocomplete="${authMode==='up'?'new-password':'current-password'}">
  <div id="a_err" style="color:var(--warn);font-size:13px;margin-top:8px"></div>
  <button class="btn wide" onclick="doAuth()">${authMode==='up'?'Создать аккаунт':'Войти'}</button>
  <p class="mut" style="margin-top:12px">Тренировки для роста вертикального прыжка: программа, журнал, замеры и графики прогресса.</p>
 </div>`;
}
function ruErr(m){
 if(/invalid login/i.test(m))return 'Неверный email или пароль';
 if(/already registered/i.test(m))return 'Такой email уже зарегистрирован';
 if(/at least 6/i.test(m))return 'Пароль должен быть не короче 6 символов';
 if(/valid email/i.test(m))return 'Некорректный email';
 if(/rate limit/i.test(m))return 'Слишком много попыток, подожди минуту';
 return m;
}
async function doAuth(){
 const em=$('#a_e').value.trim(),pw=$('#a_p').value;
 const err=m=>{$('#a_err').textContent=m};
 if(!em)return err('Введи email');
 if(pw.length<6)return err('Пароль минимум 6 символов');
 let r;
 if(authMode==='up'){
  const nm=$('#a_n').value.trim();
  if(!nm)return err('Введи имя');
  r=await sb.auth.signUp({email:em,password:pw,options:{data:{name:nm}}});
 }else{
  r=await sb.auth.signInWithPassword({email:em,password:pw});
 }
 if(r.error)return err(ruErr(r.error.message));
 if(!r.data.session)return err('Подтверди почту по ссылке из письма, затем войди');
 session=r.data.session;
 loadLocal();
 await loadCloudOwn();
 tab='prog';render();
}
async function logout(){
 if(!confirm('Выйти из аккаунта?'))return;
 await sb.auth.signOut();
 session=null;me=null;viewing=null;aw=null;
 renderAuth();
}

 });

/* ===================== ТАЙМЕР ===================== */
let tInt=null,tEnd=0;
function startTimer(sec){tEnd=Date.now()+sec*1000;clearInterval(tInt);tInt=setInterval(tick,250);tick()}
function tick(){
 const left=Math.ceil((tEnd-Date.now())/1000);
 const d=$('#tdisp');
 if(left<=0){d.textContent='0:00';d.classList.add('alert');clearInterval(tInt);tInt=null;beep();if(navigator.vibrate)navigator.vibrate([300,150,300,150,500]);return}
 d.classList.remove('alert');
 d.textContent=Math.floor(left/60)+':'+String(left%60).padStart(2,'0');
}
function stopTimer(){clearInterval(tInt);tInt=null;const d=$('#tdisp');if(d){d.textContent='–:––';d.classList.remove('alert')}}
function beep(){
 try{const ac=new (window.AudioContext||window.webkitAudioContext)();
 [0,.35,.7].forEach(t=>{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);
  o.frequency.value=880;g.gain.setValueAtTime(.4,ac.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+t+.3);
  o.start(ac.currentTime+t);o.stop(ac.currentTime+t+.3)})}catch(e){}
}

let statMetr='jumpst',statPeriod=0,statEx='';
function renderStat(){
 head('Прогресс',viewing?('ученик: '+viewing.name):'');
 const M=allMetr();
 if(!M.find(m=>m[0]===statMetr))statMetr=M[0][0];

 <div class="chips">${M.map(m=>`<span class="chip ${statMetr===m[0]?'on':''}" onclick="statMetr='${m[0]}';render()">${esc(m[1].split(',')[0])}</span>`).join('')}</div>
 <div class="chips">${[[0,'Всё время'],[30,'Месяц'],[90,'3 месяца']].map(p=>`<span class="chip ${statPeriod===p[0]?'on':''}" onclick="statPeriod=${p[0]};render()">${p[1]}</span>`).join('')}</div>
 <div style="height:230px"><canvas id="ch1"></canvas></div>
 ${exNames.length?`<h2 class="sect">Рабочий вес в упражнении</h2>
 <select onchange="statEx=this.value;render()">${exNames.map(n=>`<option ${statEx===n?'selected':''}>${esc(n)}</option>`).join('')}</select>

 <h2 class="sect">Журнал тренировок (${logs.length})</h2>
 ${[...logs].reverse().map(l=>`<div class="card" style="cursor:pointer" onclick="showLog(${l.id})">
  <div class="row" style="justify-content:space-between">
   <div><h3>${esc(l.dayTitle)}</h3><div class="mut">${fmtD(l.date)} · ${l.dur} мин · ${l.ex.length} упр.</div></div>
   ${viewing?'':`<button class="btn sm danger" onclick="event.stopPropagation();delLog(${l.id})">✕</button>`}
  </div></div>`).join('')||'<div class="card mut">Тренировок пока нет</div>'}`;
 drawCharts();
}
function cutoff(){if(!statPeriod)return '';const d=new Date(Date.now()-statPeriod*864e5);return d.toISOString().slice(0,10)}
function drawCharts(){
 const co=cutoff();
 const pts=metrics.filter(e=>e[statMetr]!=null&&String(e.d)>=co).sort((a,b)=>String(a.d).localeCompare(String(b.d)));
 if(chart)chart.destroy();
 const c1=document.getElementById('ch1');
 if(c1)chart=new Chart(c1,{type:'line',data:{labels:pts.map(p=>fmtD(p.d)),datasets:[{data:pts.map(p=>p[statMetr]),borderColor:'#4ade80',backgroundColor:'rgba(74,222,128,.15)',fill:true,tension:.3,pointRadius:4}]},
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8b93a5'},grid:{color:'#2c3342'}},y:{ticks:{color:'#8b93a5'},grid:{color:'#2c3342'}}}}});
 if(chart2)chart2.destroy();
 const c2=document.getElementById('ch2');
 if(c2){
  const data=logs.filter(l=>l.date>=co).map(l=>{
   const x=l.ex.find(x=>x.n===statEx);if(!x)return null;
   const mx=Math.max(...x.sets.map(s=>parseFloat(String(s.w).replace(',','.'))||0));
   return mx>0?{d:l.date,v:mx}:null}).filter(Boolean);
  chart2=new Chart(c2,{type:'line',data:{labels:data.map(p=>fmtD(p.d)),datasets:[{data:data.map(p=>p.v),borderColor:'#60a5fa',backgroundColor:'rgba(96,165,250,.15)',fill:true,tension:.3,pointRadius:4}]},
   options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8b93a5'},grid:{color:'#2c3342'}},y:{ticks:{color:'#8b93a5'},grid:{color:'#2c3342'}}}}});
 }
}
function showLog(id){
 const l=logs.find(l=>l.id===id);if(!l)return;
 openModal(`<h3>${esc(l.dayTitle)}</h3><div class="mut" style="margin-bottom:10px">${fmtD(l.date)} · ${l.dur} мин</div>

 const f=inp.files[0];if(!f)return;
 const r=new FileReader();
 r.onload=()=>{try{
  const d=JSON.parse(r.result);
  if(!d.prog||!Array.isArray(d.logs))throw 0;
  prog=d.prog;logs=d.logs;metrics=d.metrics||[];settings=normSettings(d.settings);
  saveProg();saveLogs();saveMetrics();saveSettings();
  if(sb&&session){logs.forEach(l=>pushLog(l));metrics.forEach(e=>pushMeas(e))}
  alert('Импорт выполнен');render();
 }catch(e){alert('Не удалось прочитать файл бэкапа')}};
 r.readAsText(f);
}
function resetProg(){
 if(!confirm('Вернуть программу к исходной? Твои правки упражнений будут потеряны (журнал и замеры останутся).'))return;
 prog=seedProgram();saveProg();render();
}

/* ===================== СТАРТ ===================== */
async function boot(){
 if(SB_URL&&SB_KEY&&window.supabase){
  sb=window.supabase.createClient(SB_URL,SB_KEY);
  try{
   const s=await sb.auth.getSession();session=s.data.session;
   sb.auth.onAuthStateChange((_e,s2)=>{session=s2||session});
  }catch(e){console.error(e)}
  if(!session){renderAuth();return}
  loadLocal();render(); // мгновенно из кэша
  try{await loadCloudOwn()}catch(e){console.error(e);toast('⚠ Нет связи с сервером — работаю из кэша')}
  render();
 }else{
  loadLocal();render();
 }
}
boot();
</script>
